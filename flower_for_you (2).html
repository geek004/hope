<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>For You 💕🐰</title>
<style>
  /* Prevent touch callouts and double-tap zoom */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html { height:100%; }
  body {
    background:#000; width:100vw; height:100vh;
    overflow:hidden; font-family:'Segoe UI',Helvetica,Arial,sans-serif;
    /* Support iPhone notch / safe area */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Intro Screen ── */
  #intro {
    position:fixed; inset:0; background:transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:50; transition:opacity 1.8s ease;
    padding: 24px;
  }
  #intro p {
    color:#fff;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight:300; letter-spacing:1px; text-align:center; line-height:1.5;
    opacity:0; transform:translateY(18px);
    animation:fadeUp 1.2s .4s ease forwards;
  }
  #intro button {
    margin-top:2rem;
    padding: clamp(14px,4vw,18px) clamp(36px,10vw,56px);
    border-radius:50px;
    background:#fff; color:#000;
    font-size: clamp(1rem, 4vw, 1.2rem);
    font-weight:600; border:none; cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,.35);
    opacity:0; transform:translateY(18px);
    animation:fadeUp 1.2s 1.1s ease forwards;
    transition:transform .15s, box-shadow .15s;
    /* Minimum touch target 48px height for mobile */
    min-height: 48px; min-width: 140px;
  }
  #intro button:active { transform:scale(0.96); }

  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  /* ── Main scene ── */
  #scene { position:fixed; inset:0; opacity:0; transition:opacity 2s ease; pointer-events:none; }
  #scene.show { opacity:1; pointer-events:all; }

  canvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; }

  /* ── Banner ── */
  #banner {
    position:absolute;
    top: 0; left: 0; right: 0;
    /* Sits in top 18% of screen */
    height: 18%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 30; /* above fireworks canvas */
    pointer-events: none;
    opacity: 0;
    transform: translateY(-30px);
    transition: opacity 2s ease, transform 2s ease;
    /* Subtle dark gradient so text is always readable over fireworks */
    background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 100%);
    padding: 12px 16px 20px;
  }
  #banner.show { opacity:1; transform:translateY(0); }

  /* Main title line */
  #banner .hb-title {
    color: #fff;
    font-size: clamp(1.6rem, 7vw, 3.4rem);
    font-weight: 700;
    letter-spacing: clamp(2px, 1.5vw, 8px);
    text-transform: uppercase;
    text-shadow:
      0 0 8px  #fff,
      0 0 20px #fff,
      0 0 40px #00f2fe,
      0 0 80px #00f2feaa;
    animation: glowPulse 2.4s ease-in-out infinite;
  }

  /* Emoji / subtitle line */
  #banner .hb-sub {
    color: rgba(255,255,255,0.85);
    font-size: clamp(1rem, 4vw, 1.8rem);
    letter-spacing: clamp(1px, 1vw, 4px);
    text-shadow: 0 0 14px #00f2fecc;
  }

  @keyframes glowPulse {
    0%,100% { text-shadow: 0 0 8px #fff, 0 0 20px #fff, 0 0 40px #00f2fe, 0 0 80px #00f2feaa; }
    50%      { text-shadow: 0 0 16px #fff, 0 0 40px #fff, 0 0 80px #00f2fe, 0 0 140px #00f2fe; }
  }

  /* ── Landscape phones: compact banner ── */
  @media (max-height: 500px) {
    #banner { height: 28%; }
    #banner .hb-title { font-size: clamp(1rem, 5vw, 1.6rem); }
    #banner .hb-sub   { font-size: clamp(.8rem, 3vw, 1.1rem); }
  }
</style>
</head>
<body>

<!-- Screen 1 -->
<canvas id="bgCanvas"></canvas>   <!-- stars + fireflies + fireworks -->

<div id="intro">
  <p>FOR THE SPECIAL ONE 🌟</p>
  <button id="startBtn">Click Here</button>
</div>

<!-- Screen 2 -->
<div id="scene">
  <canvas id="flowerCanvas"></canvas> <!-- flowers grow here -->
  <div id="banner">
    <div class="hb-title">Happy Birthday !</div>
    <div class="hb-sub">🎂 ✨ 🌸 🎆 🌸 ✨ 🎂</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════
const intro    = document.getElementById('intro');
const scene    = document.getElementById('scene');
const banner   = document.getElementById('banner');
const bgCanvas = document.getElementById('bgCanvas');
const flCanvas = document.getElementById('flowerCanvas');
const bgCtx    = bgCanvas.getContext('2d');
const flCtx    = flCanvas.getContext('2d');

let W, H;
function resize() {
  W = bgCanvas.width  = flCanvas.width  = window.innerWidth;
  H = bgCanvas.height = flCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); drawFlowers(growProgress); });

// ═══════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════
const STARS = Array.from({length:160}, () => ({
  x: Math.random(), y: Math.random() * .85,
  r: Math.random() * 1.7 + .3,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 1.6 + 0.8,
  color: Math.random() > 0.85 ? '#e0f7fc' : '#ffffff'
}));

// ═══════════════════════════════════════════════
//  FIREFLIES
// ═══════════════════════════════════════════════
const FLIES = Array.from({length:35}, () => ({
  x: Math.random(), y: .35 + Math.random() * .65,
  vx: (Math.random()-.5)*.0006, vy: (Math.random()-.5)*.0008,
  phase: Math.random() * Math.PI * 2,
  r: Math.random() * 2.5 + 1
}));

// ═══════════════════════════════════════════════
//  FIREWORKS
// ═══════════════════════════════════════════════
const FW_COLORS = ['#ff3f8e','#ffd700','#00f5ff','#b44bff','#39ff14','#ff6b35','#ffffff'];
let fwParticles = [];

class FWParticle {
  constructor(x,y,col) {
    this.x=x; this.y=y; this.col=col;
    const a = Math.random()*Math.PI*2, s = Math.random()*8+2.2;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=Math.random()*.015+.009;
    this.sparkle = Math.random() > 0.45;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=.07;
    this.vx*=.98; this.vy*=.98;
    this.life-=this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    let alpha = this.life;
    if (this.sparkle && Math.random() > 0.45) {
      alpha = this.life * 0.25;
    }
    ctx.globalAlpha=alpha;
    ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(1, 3.2 * this.life),0,Math.PI*2);
    ctx.fillStyle=this.col;
    ctx.shadowBlur=12; ctx.shadowColor=this.col;
    ctx.fill(); ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
}

function burst(x,y) {
  const col = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  const count = 75 + Math.floor(Math.random()*25);
  for(let i=0;i<count;i++) fwParticles.push(new FWParticle(x,y,col));
}

let autoFW = null;
function startFireworks() {
  // Spawn one immediately
  burst(Math.random() * W, Math.random() * (H * 0.4) + 80);
  
  autoFW = setInterval(() => {
    const count = Math.random() > 0.65 ? 2 : 1;
    for(let i=0; i<count; i++) {
      setTimeout(() => {
        burst(
          Math.random() * (W * 0.8) + (W * 0.1),
          Math.random() * (H * 0.45) + 60
        );
      }, i * 250);
    }
  }, 950);
}

// Desktop click
scene.addEventListener('click', e => {
  if(growProgress < 1) return;
  burst(e.clientX, e.clientY);
});

// Mobile touch — prevent scroll, trigger burst on each finger
scene.addEventListener('touchstart', e => {
  if(growProgress < 1) return;
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => burst(t.clientX, t.clientY));
}, { passive: false });

// ═══════════════════════════════════════════════
//  FLOWER RENDERING  (Canvas — matches screenshot)
// ═══════════════════════════════════════════════
let growProgress = 0; // 0→1

/* ── helpers ── */
function glow(ctx, r, col, blur=22) {
  ctx.shadowBlur = blur; ctx.shadowColor = col;
}
function clearGlow(ctx) { ctx.shadowBlur=0; }

/* Draw a single teardrop-shaped petal from tip toward center */
function drawPetal(ctx, cx, cy, angle, len, wid, alpha=1) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;

  // radial gradient: white core → ice-blue edge
  const grad = ctx.createRadialGradient(0, -len*.6, 0, 0, -len*.3, len*.95);
  grad.addColorStop(0,   'rgba(255,255,255,1)');
  grad.addColorStop(.3,  'rgba(220,252,255,0.97)');
  grad.addColorStop(.7,  'rgba(160,240,245,0.85)');
  grad.addColorStop(1,   'rgba(80,200,220,0)');

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo( wid*.9, -len*.3,  wid*.6, -len*.85,  0, -len);
  ctx.bezierCurveTo(-wid*.6, -len*.85, -wid*.9, -len*.3,  0,  0);

  glow(ctx, 0, '#a0f8ff', 28);
  ctx.fillStyle = grad;
  ctx.fill();
  clearGlow(ctx);
  ctx.restore();
}

/* Leaf — fat rounded shape */
function drawLeaf(ctx, x1,y1, x2,y2, side, wFactor, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;

  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const dx = x2-x1, dy = y2-y1;
  const len = Math.hypot(dx,dy);
  const nx = -dy/len * wFactor * 38 * side;
  const ny =  dx/len * wFactor * 38 * side;

  const lg = ctx.createLinearGradient(x1,y1,x2,y2);
  lg.addColorStop(0,   '#063d28');
  lg.addColorStop(.35, '#10c87a');
  lg.addColorStop(.7,  '#00ddb0');
  lg.addColorStop(1,   '#00f2fe88');

  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.quadraticCurveTo(mx+nx, my+ny, x2, y2);
  ctx.quadraticCurveTo(mx+nx*.15, my+ny*.15, x1, y1);

  glow(ctx,0,'#00e8c8',20);
  ctx.fillStyle = lg;
  ctx.fill();
  clearGlow(ctx);
  ctx.restore();
}

/* Stem — curved glowing line */
function drawStem(ctx, pts, progress, alpha=1) {
  if(progress<=0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const total = pts.length-1;
  const drawn = progress * total;
  const fullSegs = Math.floor(drawn);
  const frac = drawn - fullSegs;

  const sg = ctx.createLinearGradient(pts[0][0],pts[0][1], pts[pts.length-1][0], pts[pts.length-1][1]);
  sg.addColorStop(0,   '#0a3d24');
  sg.addColorStop(.4,  '#16a369');
  sg.addColorStop(.8,  '#1ee8aa');
  sg.addColorStop(1,   '#00f2fe');

  ctx.strokeStyle = sg;
  ctx.lineWidth   = 7;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  glow(ctx,0,'#00e0c0',18);

  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for(let i=0;i<fullSegs && i<total;i++) {
    ctx.lineTo(pts[i+1][0], pts[i+1][1]);
  }
  if(fullSegs < total) {
    const [ax,ay] = pts[fullSegs];
    const [bx,by] = pts[fullSegs+1];
    ctx.lineTo(ax + (bx-ax)*frac, ay + (by-ay)*frac);
  }
  ctx.stroke();
  clearGlow(ctx);
  ctx.restore();
}

/* Flower center disc */
function drawCenter(ctx, cx, cy, r, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  cg.addColorStop(0,  '#fff');
  cg.addColorStop(.5, '#fffb80');
  cg.addColorStop(1,  '#f0a800');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  glow(ctx,0,'#ffe680',24);
  ctx.fillStyle=cg; ctx.fill();
  clearGlow(ctx);
  ctx.restore();
}

/* Celestial stardust base glow (no ground grass) */
function drawGrass(ctx, progress) {
  ctx.save();
  const cx = W/2, baseY = H * 0.88;
  
  // Soft cosmic nebula glow at the base
  const radius = 90 * Math.min(progress * 2, 1);
  const grad = ctx.createRadialGradient(cx, baseY, 0, cx, baseY, radius);
  grad.addColorStop(0, 'rgba(0, 242, 254, 0.35)');
  grad.addColorStop(0.4, 'rgba(16, 200, 122, 0.12)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, baseY, radius, 0, Math.PI * 2);
  ctx.fill();
  
  // Floating cosmic stardust particles rising up
  ctx.fillStyle = '#1ee8aa';
  glow(ctx, 0, '#00f2fe', 12);
  for (let i = 0; i < 12; i++) {
    const p = Math.min(progress * 2.5, 1);
    const seed = i * 45.3;
    const t = (tick * 0.004 + seed) % 1;
    const px = cx + Math.sin(tick * 0.015 + seed) * (45 * p);
    const py = baseY - t * (110 * p);
    const alpha = (1 - t) * p * 0.8;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(px, py, 1.2 + Math.sin(tick * 0.04 + seed) * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  clearGlow(ctx);
  ctx.restore();
}

/* ── Three flower definitions (responsive & space-optimized) ── */
function getFlowers() {
  const cx = W/2, baseY = H * 0.88;
  // Responsive horizontal spreading based on screen width W
  const spread = Math.min(W * 0.16, 160);
  
  return [
    { // LEFT (curves gracefully to the left)
      stem: [
        [cx, baseY],
        [cx - spread * 0.25, baseY - H * 0.22],
        [cx - spread * 0.65, baseY - H * 0.44],
        [cx - spread,        baseY - H * 0.60]
      ],
      leaves:[
        {t:.3, side:-1, w:.75},{t:.55, side:1, w:.85},{t:.75, side:-1, w:.75}
      ],
      nPetals:5, petLen: Math.min(H*.1,65), petWid: Math.min(H*.042,28),
      scale:.88
    },
    { // CENTER (grows straight up, slightly taller)
      stem:[
        [cx, baseY],
        [cx,                 baseY - H * 0.25],
        [cx - spread * 0.1,  baseY - H * 0.50],
        [cx,                 baseY - H * 0.70]
      ],
      leaves:[
        {t:.28, side:-1, w:.9},{t:.5, side:1, w:1},{t:.7, side:-1, w:.8},{t:.85, side:1, w:.75}
      ],
      nPetals:5, petLen: Math.min(H*.115,76), petWid: Math.min(H*.048,32),
      scale:1
    },
    { // RIGHT (curves gracefully to the right)
      stem:[
        [cx, baseY],
        [cx + spread * 0.25, baseY - H * 0.22],
        [cx + spread * 0.65, baseY - H * 0.44],
        [cx + spread,        baseY - H * 0.60]
      ],
      leaves:[
        {t:.3, side:1, w:.75},{t:.55, side:-1, w:.85},{t:.75, side:1, w:.75}
      ],
      nPetals:5, petLen: Math.min(H*.1,65), petWid: Math.min(H*.042,28),
      scale:.88
    }
  ];
}

function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function drawFlowers(prog) {
  flCtx.clearRect(0,0,W,H);
  drawGrass(flCtx, prog);

  const flowers = getFlowers();

  flowers.forEach((fl, fi) => {
    const pts  = fl.stem;
    const tip  = pts[pts.length-1];

    /* Phase distribution across the three flowers:
       Left blooms 1st, center 2nd, right 3rd — looks sequential */
    const offset  = [-.06, 0, .06][fi];
    const fp      = clamp((prog - offset) * 1.1, 0, 1);
    const stemPrg = clamp(fp*3.5,0,1);
    const leafPrg = clamp((fp-.22)*3.5,0,1);
    const petalPrg= clamp((fp-.52)*3,0,1);
    const centerPrg=clamp((fp-.72)*5,0,1);

    // ── Stem ──
    drawStem(flCtx, pts, stemPrg);

    // ── Leaves ──
    if(leafPrg>0) {
      fl.leaves.forEach(lf => {
        const lt  = lf.t;
        const la  = clamp((leafPrg - lt*.6)/(1-lt*.5), 0, 1);
        if(la<=0) return;
        // interpolate position along stem polyline
        const segTotal = pts.length-1;
        const rawT = lt * segTotal;
        const si = Math.floor(rawT); const sf = rawT-si;
        const si2 = Math.min(si+1, pts.length-1);
        const lx = lerp(pts[si][0], pts[si2][0], sf);
        const ly = lerp(pts[si][1], pts[si2][1], sf);
        // leaf tip one segment further
        const ti = Math.min(si+1, segTotal);
        const tx2 = lerp(pts[ti][0], pts[Math.min(ti+1,pts.length-1)][0], .5);
        const ty2 = lerp(pts[ti][1], pts[Math.min(ti+1,pts.length-1)][1], .5);
        drawLeaf(flCtx, lx,ly, lx+(tx2-lx)*.7*lf.side, ly+(ty2-ly)*.5, lf.side, lf.w, la*la);
      });
    }

    // ── Petals ──
    if(petalPrg>0) {
      const s = petalPrg * petalPrg * fl.scale;
      for(let p=0;p<fl.nPetals;p++) {
        const ang = (p/fl.nPetals)*Math.PI*2 - Math.PI/2;
        drawPetal(flCtx, tip[0], tip[1], ang, fl.petLen*s, fl.petWid*s, Math.min(petalPrg*2,1));
      }
    }

    // ── Center ──
    if(centerPrg>0) {
      drawCenter(flCtx, tip[0], tip[1], 10*centerPrg*fl.scale, centerPrg);
    }
  });
}

// ═══════════════════════════════════════════════
//  BACKGROUND ANIMATION LOOP
// ═══════════════════════════════════════════════
let tick = 0;
function bgLoop() {
  requestAnimationFrame(bgLoop);
  tick++;
  bgCtx.clearRect(0,0,W,H);

  // Stars
  STARS.forEach(s => {
    // Smooth downward & diagonal drift
    s.y += s.speed * 0.00025;
    s.x += s.speed * 0.00008;
    if (s.y > 1) { s.y = 0; s.x = Math.random(); }
    if (s.x > 1) { s.x = 0; s.y = Math.random(); }

    const bright = .4 + .6*Math.sin(tick*.03*s.speed + s.phase);
    bgCtx.beginPath();
    bgCtx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    bgCtx.fillStyle = s.color === '#ffffff' ? `rgba(255,255,255,${bright})` : `rgba(224,247,252,${bright})`;
    bgCtx.fill();
  });

  // Fireflies (only after grow starts)
  if(growProgress > .1) {
    FLIES.forEach(f => {
      f.x += f.vx; f.y += f.vy;
      if(f.x<0) f.x=1; if(f.x>1) f.x=0;
      if(f.y>1) f.y=.35; if(f.y<.35) f.y=1;
      const glit = .3 + .7*Math.abs(Math.sin(tick*.04 + f.phase));
      bgCtx.beginPath();
      bgCtx.arc(f.x*W, f.y*H, f.r, 0, Math.PI*2);
      bgCtx.fillStyle   = `rgba(180,255,130,${glit})`;
      bgCtx.shadowBlur  = 12; bgCtx.shadowColor='#aaff60';
      bgCtx.fill();
      bgCtx.shadowBlur  = 0;
    });
  }

  // Fireworks
  bgCtx.save();
  fwParticles = fwParticles.filter(p=>p.life>0);
  fwParticles.forEach(p=>{ p.update(); p.draw(bgCtx); });
  bgCtx.restore();
}
bgLoop();

// ═══════════════════════════════════════════════
//  GROW ANIMATION
// ═══════════════════════════════════════════════
let growStart = null;
const GROW_DURATION = 7000; // ms

function growLoop(ts) {
  if(!growStart) growStart = ts;
  growProgress = Math.min((ts - growStart) / GROW_DURATION, 1);
  drawFlowers(growProgress);

  if(growProgress < 1) {
    requestAnimationFrame(growLoop);
  } else {
    // Show banner + fireworks when fully bloomed
    banner.classList.add('show');
    startFireworks();
  }
}

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
function startScene() {
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display='none', 1800);
  scene.classList.add('show');
  setTimeout(() => requestAnimationFrame(growLoop), 800);
}

// Both click and touchend to support all devices
const startBtn = document.getElementById('startBtn');
startBtn.addEventListener('click', startScene);
startBtn.addEventListener('touchend', e => { e.preventDefault(); startScene(); }, { passive:false });

// Prevent context menu on long press (mobile)
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
